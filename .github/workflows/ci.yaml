name: CI

on:
  push:
    # Run on the main branch
    branches:
      - main
      - release/*
  # Also on PRs, just be careful not to publish anything
  pull_request:
  # Allow to be called from other workflows (like "release")
  workflow_call:
  # But don't trigger on tags, as they are covered by the "release.yaml" workflow

jobs:

  fmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: webiny/action-conventional-commits@v1.4.2

      - name: Check formatting
        run: |
          cargo fmt --check

  test:

    strategy:
      matrix:

        rust:
          - stable
          - "1.88" # MSRV

        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

        include:
          - os: ubuntu-latest
            install: |
              sudo apt install -y libssl-dev
          - os: windows-latest
            install: |
              echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
              vcpkg install openssl:x64-windows-static-md

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Configure vcpkg binary cache
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cache_dir="${{ runner.temp }}/vcpkg-binary-cache"
          mkdir -p "$cache_dir"
          echo "VCPKG_DEFAULT_BINARY_CACHE=$cache_dir" >> "$GITHUB_ENV"
          echo "VCPKG_BINARY_SOURCES=clear;files,$cache_dir,readwrite" >> "$GITHUB_ENV"

      - name: Cache vcpkg binaries
        uses: actions/cache@v6
        if: runner.os == 'Windows'
        with:
          path: ${{ runner.temp }}/vcpkg-binary-cache
          key: ${{ runner.os }}-vcpkg-${{ matrix.rust }}-${{ hashFiles('.github/workflows/ci.yaml') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ matrix.rust }}-

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.rust }}

      - name: Disable rustup auto update
        run: |
          rustup set auto-self-update disable

      - name: Install Rust ${{ matrix.rust }}
        run: |
          rustup install ${{ matrix.rust }}
          rustup toolchain install ${{ matrix.rust }} --component clippy

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Check
        run: cargo +${{ matrix.rust }} check --workspace ${{ matrix.args }}

      - name: Clippy
        run: cargo +${{ matrix.rust }} clippy --all-targets --tests --bins --all -- -D warnings

      - name: Test
        run: cargo +${{ matrix.rust }} test --workspace ${{ matrix.args }} -- --nocapture

  features:
    needs: fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: sudo apt install -y libssl-dev

      - name: Install cargo-all-features
        run: cargo install cargo-all-features

      - name: Check all feature combinations
        run: cargo check-all-features

  ci:
    runs-on: ubuntu-latest
    needs:
      - fmt
      - test
      - features
    if: always()
    steps:
      - name: Success
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: Failure
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
